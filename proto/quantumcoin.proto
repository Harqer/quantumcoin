syntax = "proto3";

package quantumcoin;

// The Quantum Engine service definition
service QuantumEngine {
  // Generate Quantum Random Numbers
  rpc GenerateQnrg (QnrgRequest) returns (QnrgResponse) {}
  
  // Future: DI-QKD Key Distribution
  // rpc GenerateQkdKey (QkdRequest) returns (QkdResponse) {}
}

// Request payload for QNRG
message QnrgRequest {
  string user_id = 1;
  int32 byte_length = 2; // e.g., 32 for a 256-bit seed
}

// Response payload for QNRG
message QnrgResponse {
  bool success = 1;
  string message = 2;
  bytes random_seed = 3; 
  string device_used = 4; // e.g., "IBM_Q_SYSTEM_ONE" or "SIMULATOR"
}
