# NGINX Edge Gateway Configuration (Service Mesh Placeholder)
# In production, this would be deployed as an independent container or via Kong/Envoy.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # GZIP Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate Limiting Zones (Hermes Enterprise Parity)
    # 10 requests per second per IP for standard API calls
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # 2 requests per second for sensitive mutating endpoints (Stripe/Plaid)
    limit_req_zone $binary_remote_addr zone=sensitive_limit:10m rate=2r/s;

    # Upstream routing to the FastAPI Uvicorn servers
    upstream quantum_gateway {
        # Docker Compose service name or Kubernetes Service
        server api:8000;
    }

    server {
        listen 80;
        listen 443 ssl http2;
        server_name api.quantumcoin.com;

        # SSL Configuration (Paths to be provided by environment or certbot)
        ssl_certificate /etc/nginx/ssl/live/api.quantumcoin.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/api.quantumcoin.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Healthcheck for load balancers
        location /health {
            access_log off;
            return 200 "OK\n";
        }

        # GraphQL Edge Routing
        location /graphql {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://quantum_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Sensitive Endpoints (Plaid / Billing)
        location ~ ^/api/v1/(plaid|billing)/ {
            limit_req zone=sensitive_limit burst=5 nodelay;
            
            # NOTE: In a full Kong/OpenResty setup, we would execute Lua here 
            # to verify the X-Payload-Signature HMAC before passing traffic.
            # For now, it passes through to Python auth.py.
            
            proxy_pass http://quantum_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # General API routing
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://quantum_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
