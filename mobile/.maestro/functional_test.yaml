appId: com.harqer.quantumcoin
name: Functional E2E Traversal
---
- launchApp
# Flow 1: Auth (Sign Up)
- tapOn:
    id: "btn-signup"
- extendedWaitUntil:
    visible:
      id: "input-first-name"
    timeout: 5000
- tapOn:
    id: "input-first-name"
- inputText: "Alice"
- tapOn:
    id: "input-last-name"
- inputText: "Quantum"
- tapOn:
    id: "btn-next"
- extendedWaitUntil:
    visible:
      id: "input-dob"
    timeout: 5000
- tapOn:
    id: "input-dob"
- inputText: "01/01/1990"
- tapOn:
    id: "btn-next"
- extendedWaitUntil:
    visible:
      id: "input-email"
    timeout: 5000
- tapOn:
    id: "input-email"
- inputText: "alice@quantumcoin.com"
- tapOn:
    id: "btn-next"
- extendedWaitUntil:
    visible:
      id: "input-code"
    timeout: 5000
- tapOn:
    id: "input-code"
- inputText: "123456"
- tapOn:
    id: "btn-next"

# Flow 2: Dashboard Onboarding
- extendedWaitUntil:
    visible:
      id: "btn-next"
    timeout: 10000
- tapOn:
    id: "btn-next"
- extendedWaitUntil:
    visible:
      id: "btn-next"
    timeout: 5000
- tapOn:
    id: "btn-next"
- extendedWaitUntil:
    visible:
      id: "intent-budget"
    timeout: 5000
- tapOn:
    id: "intent-budget"
- tapOn:
    id: "btn-continue"

# Flow 3: Main Dashboard actions
- extendedWaitUntil:
    visible:
      id: "input-chat"
    timeout: 10000
- tapOn:
    id: "input-chat"
- inputText: "What is my balance?"
- tapOn:
    id: "btn-send"
- runFlow:
    file: "flows/budget.yaml"
- runFlow:
    file: "flows/banks-list.yaml"
- runFlow:
    file: "flows/credit-builder.yaml"
