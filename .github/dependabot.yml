version: 2
updates:
  # Enable version updates for npm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "Harqer"
    assignees:
      - "Harqer"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    # Auto-merge for patch and minor updates
    auto-rebase-and-merge: true
    open-pull-requests-limit: 10

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "Harqer"
    commit-message:
      prefix: "ci(deps)"
    auto-rebase-and-merge: true
    open-pull-requests-limit: 10
