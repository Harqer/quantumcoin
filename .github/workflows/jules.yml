name: Jules AI Security Audit
on:
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Jules Codebase Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Jules Audit
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          npm install -g jules-cli
          jules audit . --ci
