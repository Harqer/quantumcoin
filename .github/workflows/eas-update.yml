name: EAS Update
on:
  push:
    branches:
      - main

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest

      - name: Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Run eas update
        working-directory: ./mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is not set. Skipping."
            exit 0
          fi
          eas update --auto || echo "EAS Update failed, continuing pipeline."
