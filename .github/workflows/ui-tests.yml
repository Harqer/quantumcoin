name: UI Feature Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  maestro-test:
    name: Run Maestro E2E Tests
    runs-on: macos-latest # macOS is usually better for running Android emulators in GitHub Actions with hardware acceleration
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install Dependencies
        run: |
          cd mobile
          npm ci

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android App (Debug)
        run: |
          cd mobile/android
          ./gradlew assembleDebug

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to Path
        run: echo "${HOME}/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_6
          script: |
            # Install the APK
            adb install mobile/android/app/build/outputs/apk/debug/app-debug.apk
            # Run the Maestro test suite
            maestro test mobile/.maestro/functional_test.yaml
