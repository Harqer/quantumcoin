name: Automated API Fuzzing
on:
  pull_request:
    branches: [main]

jobs:
  fuzz:
    name: ffuf API Fuzzing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Start Local Backend API
        working-directory: web
        env:
          DATABASE_URL: "postgresql://mock"
          CLERK_SECRET_KEY: "mock_secret"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "mock_key"
        run: |
          npm install --legacy-peer-deps
          # Start the backend server (Next.js API routes on port 3000)
          npm run dev &
          # Wait for server to boot
          sleep 20
          
      - name: Install ffuf
        run: |
          wget https://github.com/ffuf/ffuf/releases/download/v2.1.0/ffuf_2.1.0_linux_amd64.tar.gz
          tar -xvf ffuf_2.1.0_linux_amd64.tar.gz
          sudo mv ffuf /usr/local/bin/
          
      - name: Download API Fuzzing Dictionary (SecLists)
        run: |
          wget https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/Web-Content/api/api-endpoints.txt
          
      - name: Run ffuf
        run: |
          # Fuzz the API endpoints looking for unhandled errors (500s) or unexpected 200s
          # We ignore 404s (NotFound) and 401s (Unauthorized)
          ffuf -w api-endpoints.txt -u http://localhost:3000/api/FUZZ -mc 200,500 -t 50
