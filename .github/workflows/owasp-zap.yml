name: OWASP ZAP Automated Fuzzing

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  zap_scan:
    name: DAST / Fuzzing with OWASP ZAP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # Target URL will be updated dynamically based on staging environment
          target: 'https://www.getqubits.com'
          # Prevent the pipeline from failing abruptly, ensuring reports are always generated
          fail_action: false
          # Generate an HTML report for the team
          cmd_options: '-a'
