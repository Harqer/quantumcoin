name: Dependabot AI Remediation Pipeline

on:
  workflow_dispatch:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: write
  pull-requests: write
  security-events: read

jobs:
  remediate-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g tsx
          npm install @google/genai

      - name: Run AI Remediation Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npx tsx scripts/dependabot_ai_remediator.ts
