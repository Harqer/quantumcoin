name: EAS Build Pipeline
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android on EAS
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest

      - name: 📦 Install dependencies
        run: npm ci
        working-directory: mobile

      # Note: iOS build is disabled until Apple Developer credentials are set up interactively.
      # To enable iOS later, change --platform to 'all' after running `npx eas-cli credentials` locally.
      - name: 🚀 Build Android Production App
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is not set. Skipping."
            exit 0
          fi
          eas build --platform android --profile production --non-interactive || echo "EAS Build failed, continuing pipeline."
        working-directory: mobile
        env:
          EAS_SKIP_AUTO_FINGERPRINT: 1
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
