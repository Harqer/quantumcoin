version: "3.9"

# Production deployment for quantum backend at scale.
# Supports horizontal scaling via replicas and load balancing.
#
# Usage:
#   docker compose -f docker-compose.quantum.yml up -d --scale quantum-api=4
#
# This spins up 4 instances behind the nginx load balancer.
# Each instance runs 4 uvicorn workers = 16 total worker processes.
# With entropy pool, each worker serves QNRG requests in <1ms.

services:
  quantum-api:
    build:
      context: ./quantum_backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - SERVER_WORKERS=4
      - POOL_ENABLED=true
      - POOL_SIZE_BYTES=4194304      # 4 MB entropy pool per instance
      - POOL_NUM_REFILL_WORKERS=4
      - POOL_REFILL_BATCH_BYTES=8192
      - QUEUE_MAX_CONCURRENT=8
      - QUEUE_MAX_SIZE=50000
      - RATE_LIMIT_PER_MINUTE=120
      - RATE_LIMIT_BURST=40
      - LB_STRATEGY=failover
    expose:
      - "8000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Nginx load balancer for horizontal scaling
  quantum-lb:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./quantum_backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - quantum-api
    restart: unless-stopped

  # Redis for shared entropy pool and rate limiting across instances (future)
  # Uncomment when scaling beyond a single host.
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M
