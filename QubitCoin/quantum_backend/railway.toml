[build]
builder = "dockerfile"
dockerfilePath = "./Dockerfile"

[deploy]
startCommand = "python -m uvicorn quantum_backend.server:app --host 0.0.0.0 --port $PORT --workers 4 --log-level info --timeout-keep-alive 30"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
