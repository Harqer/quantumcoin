upstream quantum_backend {
    # Docker service discovery — each replica gets a DNS entry
    server quantum-api:8000;

    # Sticky sessions by client IP for consistent pool access
    ip_hash;

    # Connection keepalive for reduced latency
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Timeouts for long-running QPU calls (QKD, DI-QKD)
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    location / {
        proxy_pass http://quantum_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Health check endpoint — lightweight, no QPU calls
    location /health {
        proxy_pass http://quantum_backend/health;
        proxy_read_timeout 5s;
    }

    # Metrics — internal only in production
    location /metrics {
        proxy_pass http://quantum_backend/metrics;
        # In production, restrict to internal IPs:
        # allow 10.0.0.0/8;
        # deny all;
    }
}
